<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sta. Rita Accounting Office — Billing System</title>

  <!-- Favicon & Icons -->
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SRAO Billing">
  <meta name="application-name" content="SRAO Billing">
  <meta name="theme-color" content="#0f2340">
  <meta name="description" content="Centralized Billing System for Sta. Rita Accounting Office — taxpayers, billing statements, payments, aging and summaries.">

  <!-- MS Tiles -->
  <meta name="msapplication-TileImage" content="icon.png">
  <meta name="msapplication-TileColor" content="#0f2340">
  <meta name="msapplication-tap-highlight" content="no">

  <!-- Open Graph -->
  <meta property="og:title"       content="Sta. Rita Accounting Office — Billing System">
  <meta property="og:description" content="Centralized Billing System for Sta. Rita Accounting Office.">
  <meta property="og:type"        content="website">
  <meta property="og:image"       content="icon.png">
  <meta name="twitter:card"       content="summary">
  <meta name="twitter:title"      content="Sta. Rita Accounting Office — Billing System">
  <meta name="twitter:description" content="Centralized Billing System for Sta. Rita Accounting Office.">

  <!-- Manifest — required for real PWA install -->
  <link rel="manifest" href="manifest.json">

  <!-- Fonts (match the app) -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f2340; width: 100vw; height: 100vh; overflow: hidden; }

    /* ── SPLASH ── */
    #splash {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, #1a3a6b 0%, #0f2340 70%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999; transition: opacity 0.6s ease;
    }

    #splash .logo-wrap {
      position: relative;
      width: 160px; height: 160px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Outer spinning ring — gold */
    #splash .logo-wrap::before {
      content: '';
      position: absolute; inset: -8px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #c9a84c;
      border-right-color: #c9a84c;
      animation: spin 2s linear infinite;
    }

    /* Inner spinning ring — light gold (reverse) */
    #splash .logo-wrap::after {
      content: '';
      position: absolute; inset: -14px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-bottom-color: #e8c97a;
      border-left-color: #e8c97a;
      animation: spin 3s linear infinite reverse;
    }

    #splash img {
      width: 150px; height: 150px;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
      box-shadow:
        0 0 0 3px #c9a84c,
        0 0 40px rgba(201,168,76,0.45),
        0 10px 40px rgba(0,0,0,0.8);
      animation: pulse 2s ease-in-out infinite;
    }

    /* Fallback logo — shown if icon.png fails to load */
    #splash .logo-fallback {
      width: 150px; height: 150px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0f2340, #1a3a6b);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      box-shadow:
        0 0 0 3px #c9a84c,
        0 0 40px rgba(201,168,76,0.45),
        0 10px 40px rgba(0,0,0,0.8);
      animation: pulse 2s ease-in-out infinite;
    }

    #splash .logo-fallback .mono {
      font-family: 'Playfair Display', serif;
      color: #c9a84c; font-size: 52px; font-weight: 700; line-height: 1;
    }

    #splash .logo-fallback span {
      color: rgba(255,255,255,0.85);
      font-size: 9px; font-weight: 600;
      margin-top: 8px; letter-spacing: 1.5px;
      font-family: 'DM Sans', sans-serif;
    }

    #splash .app-name {
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 700;
      margin-top: 28px; letter-spacing: .5px; text-align: center; line-height: 1.2;
      text-shadow: 0 0 20px rgba(201,168,76,0.4), 0 2px 8px rgba(0,0,0,0.8);
    }

    #splash .gold-bar { width: 48px; height: 3px; background: #c9a84c; margin: 12px auto 0; border-radius: 2px; }

    #splash .app-sub {
      color: rgba(255,255,255,0.65);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500;
      margin-top: 12px; letter-spacing: 3px; text-transform: uppercase;
    }

    #splash .loading-bar-wrap {
      margin-top: 36px; width: 180px; height: 3px;
      background: rgba(255,255,255,0.12);
      border-radius: 4px; overflow: hidden;
    }

    #splash .loading-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #c9a84c, #1a3a6b);
      border-radius: 4px;
      animation: loadbar 4s ease-in-out forwards;
      box-shadow: 0 0 10px rgba(201,168,76,0.8);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes loadbar {
      0%   { width: 0%; }
      40%  { width: 60%; }
      80%  { width: 85%; }
      100% { width: 100%; }
    }

    /* ── APP IFRAME ── */
    #app-frame {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      border: none; z-index: 1;
    }

    /* ── INSTALL BANNER ── */
    #installBanner {
      display: none;
      position: fixed; bottom: 20px; left: 12px; right: 12px;
      z-index: 998;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(15,35,64,0.2);
      border: 1.5px solid #e2eaf4;
      padding: 14px 16px;
      align-items: center; gap: 12px;
    }

    #installBanner img {
      width: 44px; height: 44px;
      border-radius: 12px; flex-shrink: 0; background: #fff;
    }

    #installBanner .ib-text { flex: 1; min-width: 0; }

    #installBanner .ib-title {
      font-weight: 700; font-size: 14px; color: #0f2340;
      font-family: 'DM Sans', sans-serif;
    }

    #installBanner .ib-sub {
      font-size: 12px; color: #6b7fa3; margin-top: 2px;
      font-family: 'DM Sans', sans-serif;
    }

    #installBanner .ib-install {
      background: linear-gradient(135deg, #0f2340, #1a3a6b);
      color: #fff; border: none; border-radius: 10px;
      padding: 9px 16px; font-size: 12px; font-weight: 700;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      font-family: 'DM Sans', sans-serif;
    }

    #installBanner .ib-close {
      background: none; border: none; color: #6b7fa3;
      font-size: 20px; cursor: pointer; padding: 4px;
      flex-shrink: 0; line-height: 1;
    }
  </style>
</head>
<body>

  <!-- ═══ SPLASH SCREEN ═══ -->
  <div id="splash">
    <div class="logo-wrap">
      <img
        src="icon.png"
        alt="Sta. Rita Accounting Office"
        onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex';"
      >
      <div class="logo-fallback" id="logo-fallback" style="display:none;">
        <div class="mono">SR</div>
        <span>STA. RITA</span>
      </div>
    </div>
    <div class="app-name">Sta. Rita<br>Accounting Office</div>
    <div class="gold-bar"></div>
    <div class="app-sub">Centralized Billing System</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
  </div>

  <!-- ═══ MAIN APP — replace src with your Apps Script Web App URL (…/exec) ═══ -->
  <iframe
    id="app-frame"
    src="REPLACE_WITH_YOUR_GAS_WEB_APP_URL"
    allow="fullscreen"
    allowfullscreen
  ></iframe>

  <!-- ═══ PWA INSTALL BANNER ═══ -->
  <div id="installBanner">
    <img src="icon.png" alt="SRAO Billing">
    <div class="ib-text">
      <div class="ib-title">Add to Home Screen</div>
      <div class="ib-sub">Install the Billing System for quick access</div>
    </div>
    <button class="ib-install" onclick="triggerInstall()">Install</button>
    <button class="ib-close"   onclick="dismissInstall()">✕</button>
  </div>

  <script>
    // ── Service Worker registration (required for PWA) ──
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js')
          .then(function (reg) { console.log('[SW] Registered:', reg.scope); })
          .catch(function (err) { console.warn('[SW] Registration failed:', err); });
      });
    }

    // ── Splash: dismiss when iframe finishes loading ──
    var frame  = document.getElementById('app-frame');
    var splash = document.getElementById('splash');

    frame.onload = function () {
      setTimeout(function () {
        splash.style.opacity = '0';
        setTimeout(function () { splash.style.display = 'none'; }, 600);
      }, 1000);
    };

    // ── Safety fallback: always dismiss after 6 seconds ──
    setTimeout(function () {
      splash.style.opacity = '0';
      setTimeout(function () { splash.style.display = 'none'; }, 600);
    }, 6000);

    // ── PWA Install prompt ──
    var deferredPrompt;

    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBanner').style.display = 'flex';
    });

    window.addEventListener('appinstalled', function () {
      document.getElementById('installBanner').style.display = 'none';
      deferredPrompt = null;
    });

    function triggerInstall() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function () { deferredPrompt = null; });
    }

    function dismissInstall() {
      document.getElementById('installBanner').style.display = 'none';
    }
  </script>

</body>
</html>
